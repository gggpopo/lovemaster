spring:
  application:
    name: yu-ai-agent
  profiles:
    active: local
  # Redis 配置（启用 app.memory.redis.enabled=true 时生效）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:bytedance}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    locations: classpath:db/migration
  ai:
    dashscope:
      # 需要替换为你自己的 key
      api-key: ${DASHSCOPE_API_KEY:your-api-key}
      chat:
        options:
          model: qwen-plus

    # 火山引擎 Ark / 豆包：通过 OpenAI 兼容接口接入（需要启用 spring-ai-starter-model-openai 依赖）
    # 注意：加入 OpenAI starter 后，若不配置 api-key，OpenAI 相关自动配置会直接报错导致启动失败。
    openai:
      api-key: ${VOLCENGINE_API_KEY:5d9c396e-e9aa-4c22-82c1-080cfb48ee6d}
      base-url: https://ark.cn-beijing.volces.com/api/v3
      chat:
        # 火山引擎 Ark 的 OpenAI-Compatible Chat Completions 路径为 /chat/completions
        # Spring AI 默认是 /v1/chat/completions，会拼成 /api/v3/v1/chat/completions 从而 404
        completions-path: /chat/completions
        options:
          model: doubao-seed-1-8-251228
      embedding:
        # 火山引擎 Ark 的 OpenAI-Compatible Embeddings 路径为 /embeddings
        # Spring AI 默认是 /v1/embeddings，会拼成 /api/v3/v1/embeddings 从而 404
        embeddings-path: /embeddings
        options:
          model: doubao-embedding-text-240715

#    ollama:
#      base-url: http://localhost:11434
#      chat:
#        model: gemma3:1b

# LLM 选择开关：dashscope（默认）/ volcengine
# 由 src/main/java/com/yupi/yuaiagent/config/ChatModelSelectorConfig.java 统一选择 @Primary ChatModel
app:
  llm:
    provider: volcengine
  orchestration:
    multi-agent:
      enabled: true
    sse:
      protocol: v2
    interrupt:
      enabled: true
    # V3 动态编排配置
    v3:
      enabled: true
      plan-agent:
        model: qwen-plus
        temperature: 0.1
        max-tokens: 500
        cache-enabled: false
        cache-ttl-seconds: 3600
      token-budget:
        default: 800
        chitchat: 200
        emotion-support: 400
        date-planning: 600
  rag:
    vectorstore:
      store: simple
      preload-documents: false
      pgvector:
        initialize-schema: false
        schema-name: public
        table-name: love_app_vector_store
        dimensions: 1536
        max-document-batch-size: 10000
    retriever:
      top-k: 5
      max-top-k: 20
      similarity-threshold: 0.55
      status-filter:
    chunk:
      enabled: true
      max-tokens: 300
      min-chars: 80
      min-words: 20
      max-chunks: 2000
      keep-separator: true
    keyword-enrich:
      enabled: false
    eval:
      default-top-k: 5
      max-top-k: 20
      default-similarity-threshold: 0.55
  debug:
    rag-eval:
      enabled: false
    memory:
      enabled: false
  # Redis 记忆层配置
  memory:
    # 用户画像本地落盘（不依赖 Redis）
    profile:
      local-dir: ${APP_PROFILE_LOCAL_DIR:./tmp/user-profiles}
    # 本地文件记忆（默认启用，避免重启后丢失对话上下文）
    file:
      enabled: true
      dir: ${user.dir}/tmp/chat-memory
    # 云端记忆库：异步预取 + 本地缓存（需要自行提供 token，建议用环境变量）
    cloud:
      enabled: false
      search-url: https://api-knowledgebase.mlp.cn-beijing.volces.com/api/memory/search
      # 写入接口（不同产品线可能不同；按需改为 /api/memory/add 等）
      upsert-url: https://api-knowledgebase.mlp.cn-beijing.volces.com/api/memory/upsert
      token: ${VOLC_MEMORY_TOKEN:}
      collection-name: agent_learn
      limit: 10
      memory-type: [event_v1, profile_v1]
      # 用户画像异步上云最小间隔（毫秒），用于削峰；0 表示不限制
      profile-min-sync-interval-ms: 5000
    redis:
      enabled: true  # 开关控制，设为 true 启用 Redis 记忆
      ttl-minutes: 60  # 对话记忆过期时间（分钟）
      profile-ttl-days: 30  # 用户画像过期时间（天）
    vector:
      # 默认临时关闭“对话记忆向量化”；如需开启可设置 APP_MEMORY_VECTOR_ENABLED=true
      enabled: ${APP_MEMORY_VECTOR_ENABLED:false}
      store: pgvector
      topk: 5
      similarity-threshold: 0.65
      pgvector:
        initialize-schema: false
        schema-name: public
        table-name: conversation_memory_store
        dimensions: 2048
    mid:
      enabled: true
      max-records-per-batch: 8
      search-scan-limit: 60
      default-importance: 0.70
    rerank:
      weight-similarity: 0.45
      weight-recency: 0.20
      weight-importance: 0.20
      weight-keyword: 0.15
    recall:
      candidate-limit: 20
  # 工具开关配置
  tools:
    sticker:
      enabled: true  # 表情包推荐工具
    content-safety:
      enabled: true  # 内容安全检测工具
    tone-style:
      enabled: true  # 语气风格转换工具
  # 多租户配置
  tenant:
    enabled: false  # 多租户开关
    rate-limit:
      enabled: true  # 限流开关
      requests-per-minute: 60  # 每分钟请求数限制
