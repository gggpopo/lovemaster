server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yupi.yuaiagent.controller
# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn
# searchAPI
search-api:
  # 需要替换为你自己的 key
  api-key: ${SEARCH_API_KEY:}
# 高德地图 Web Service API
amap:
  api-key: ${AMAP_API_KEY:37009ce089714bfc72fe5e7fb315ada3}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
# 修改日志级别，查看 Spring AI 更多调用细节
logging:
  level:
    org.springframework.ai: DEBUG
    com.yupi.yuaiagent: INFO
    com.yupi.yuaiagent.controller: INFO
    com.yupi.yuaiagent.tools: INFO
